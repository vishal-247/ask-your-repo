services:
  - type: web
    name: ask-your-repo
    runtime: python

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: NVIDIA_API_KEY
        sync: false

      - key: GITHUB_TOKEN
        sync: false