<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Your Repo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

    
        <h1>🔥 Ask Your Repo</h1>

        <h2>Enter GitHub Username</h2>

        <input
            type="text"
            id="usernameInput"
            placeholder="GitHub username"
        >

        <button onclick="fetchRepos()">
            Fetch Repositories
        </button>

        <div id="repoList"></div>
        <div id="selectedRepoBox"></div>
        <div id="architectureBox"></div>

        <hr>



        <input
            type="text"
            id="questionInput"
            placeholder="Ask about the repository"
        >

        <button onclick="askQuestion()">
            Ask
        </button>

        <div id="responseBox"></div>

        <button onclick="generateRoadmap()">
            Generate Learning Roadmap
        </button>

        <div id="roadmapBox"></div>
        

    </div>

    <script src="main.js"></script>

</body>

</html>
